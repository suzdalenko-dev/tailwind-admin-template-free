<!DOCTYPE html>
<html lang="es" class="bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Calidad</title>
    <script src="/assets/css/taiwling.js"></script>
    <meta name="description" content="">
    <meta name="author" content="Alexey Suzdalenko">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/dashboard/calidad-inspeccion/css/style.css">
</head>
<body>
    <span class="to_back_button" onclick="goToBack('/dashboard/#calidad-inspecciones-plantillas-excel')">⬅️ Volver </span>
    <div class="inspection-mobile-wrap">
        <div class="w-full mx-auto mb-4 flex justify-between items-center">
            <span> </span>
            <h1 class="text-xl text-center">Inspección de Calidad</h1>
            <span> </span>
        </div>
        <div class="flex flex-col gap-3 text-sm w-full">
            <div class="inspection-card" id="block_templates" style="display: none;">
                <div class=" inspection-section-title">Nueva inspección</div>
                <div id="listTemplatesMobile">
                    <div class="text-center p-2 text-gray-500">Cargando plantillas...</div>
                </div>
            </div>
            <div class="inspection-card" id="id_unfinished" style="display: none;">
                <div class=" inspection-section-title">
                    Inspecciones no terminadas
                </div>
                <div id="listPendingResponsesMobile">
                    <div class="text-center p-2 text-gray-500">Cargando inspecciones...</div>
                </div>
            </div>

        </div>

    </div>

    <script src="/assets/js/4.notifications.js"></script>
    <script src="/assets/js/0.config.js"></script>
    <script src="/assets/js/5.functions.js"></script>
    <script src="/assets/js/8.loader.js"></script>

    <script>
        getListTemaplates();
        getListUnfinishedInspecionts();

        function continueInpection(inspeccion_id){
          window.location.href = '/dashboard/calidad-inspeccion/proceso-inspeccion/?cab_res='+inspeccion_id;
        }

        function getListUnfinishedInspecionts(){
          fetch(HTTP_HOST+'calidad/get_unfin/0/0/inspecciones_calidad/').then(r => r.json()).then(r => {
            if(r && r.data && r.data.list_cab_res && r.data.list_cab_res.length > 0){
              document.getElementById('id_unfinished').style.display = 'block';
              console.log(r.data.list_cab_res)
              let html = '';
              r.data.list_cab_res.map(t => {
                html += ` <div class="inspection-line-card">
                              <div class="inspection-line-title">${t.name}</div>
                              <div class="inspection-line-subtitle">Inicio: ${t.fecha_inicio}</div>
                              <div class="inspection-line-subtitle">Operario: ${t.operario}</div>
                              <div class="inspection-line-actions">
                                  <span class="b-top-page" onclick="continueInpection(${t.id})">✍️ Continuar</span>
                              </div>
                          </div>`;
              });
              document.getElementById('listPendingResponsesMobile').innerHTML = html;
            } else {
              document.getElementById('id_unfinished').style.display = 'none';
            }
          }).catch(e => {
            showM(e, 'error');
          });
        }

        function createNewInspection(template_id){
          let user_name = prompt('¿Nombre Usuario?').trim();
          if(user_name && user_name.length > 3){
            let formData = new FormData();
                formData.append('user_name', user_name);
                formData.append('template_id', template_id)
            fetch(HTTP_HOST + 'calidad/create_new_insp/0/0/inspecciones_calidad/', {method:'POST', body: formData}).then(r => r.json()).then(r => {
              if(r && r.data && r.data.cab_res > 0){
                window.location.href = '/dashboard/calidad-inspeccion/proceso-inspeccion/?cab_res='+r.data.cab_res;
              } else{
                 showM('Error al crear nueva inspeccion', 'error');
              }
            }).catch(e => {
              showM(e, 'error');
            })
          }
        }

        function getListTemaplates(){
          fetch(HTTP_HOST+'calidad/all/0/0/inspecciones_calidad/').then(r => r.json()).then(r => {
            if(r && r.data && r.data.templates && r.data.templates.length > 0){
              document.getElementById('block_templates').style.display = 'block';
              let html = '';
              r.data.templates.map(t => {
                html += `<div class="inspection-line-card">
                          <div class="inspection-line-title">${t.name}</div>
                          <div class="inspection-line-subtitle">${t.fecha}</div>
                          <div class="inspection-line-actions">
                            <span class="b-top-page" onclick="createNewInspection(${t.id})">▶️ Empezar</span>
                          </div>
                        </div>`;
              });
              document.getElementById('listTemplatesMobile').innerHTML = html;
            } else {
              document.getElementById('block_templates').style.display = 'none';
            }
            console.log(r);
          }).catch(e => {
            showM(e, 'error');
          });
        }

        function goToBack(x){
          window.location.href = x;
        }
    </script>
</body>
</html>
