<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Alertas producción</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Verdana, Arial, sans-serif;
            background: #f3f0e8;
            color: #111827;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #1f2933;
            color: white;
            padding: 18px 22px;
            border-radius: 6px 6px 0 0;
            border-top: 6px solid #f59e0b;
        }

        .header small {
            color: #facc15;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            font-size: 11px;
        }

        .header h1 {
            margin: 8px 0 0 0;
            font-size: 19px;
        }

        .content {
            background: white;
            border: 1px solid #b8b3a5;
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 20px;
        }

        .alert-box {
            background: #fffbeb;
            border-left: 5px solid #f59e0b;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 13px;
        }

        .ok-box {
            background: #ecfdf5;
            border-left: 5px solid #16a34a;
            padding: 12px 14px;
            margin-top: 18px;
            font-size: 13px;
            color: #14532d;
            font-weight: 700;
        }

        .error-box {
            background: #fef2f2;
            border-left: 5px solid #dc2626;
            padding: 12px 14px;
            margin-top: 18px;
            font-size: 13px;
            color: #7f1d1d;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #b8b3a5;
        }

        th {
            background: #374151;
            color: white;
            padding: 9px;
            font-size: 12px;
            text-align: left;
        }

        td {
            border-bottom: 1px solid #d6d3c8;
            padding: 9px;
            font-size: 12px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty {
            background: #fef2f2;
            border-left: 5px solid #dc2626;
            padding: 14px 16px;
            color: #7f1d1d;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div id="alertas_container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const product = params.get("product") || "";

        function pintarAlertas() {
            let html = "";

            if (product !== "") {
                const items = product.split(",");

                items.forEach((item, index) => {
                    const partes = item.split("-");

                    const codigo_articulo = partes[0] || "";
                    const lote = partes[1] || "";
                    const of = partes[2] || "";

                    html += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${codigo_articulo}</td>
                            <td>${lote}</td>
                            <td>${of}</td>
                        </tr>
                    `;
                });

                document.getElementById("alertas_container").innerHTML = `
                    <div class="page">
                        <div class="header">
                            <small>Control industrial · Producción</small>
                            <h1>⚠ Aviso de caducidad en creación de lote de producción</h1>
                        </div>

                        <div class="content">
                            <div class="alert-box">
                                Alerta recibida desde correo. Se han recibido <b>${items.length}</b> línea(s).
                            </div>

                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Código artículo</th>
                                        <th>Lote</th>
                                        <th>OF</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${html}
                                </tbody>
                            </table>

                            <div id="estado_fetch" class="alert-box" style="margin-top:18px;">
                                Registrando alerta recibida...
                            </div>
                        </div>
                    </div>
                `;
            } else {
                document.getElementById("alertas_container").innerHTML = `
                    <div class="page">
                        <div class="content">
                            <div class="empty">
                                No se han recibido datos.
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function registrarPulsadoBotonCorreo() {
            if (product === "") {
                return;
            }

            const url_api = "http://192.168.1.30/api/compras/get/0/0/pulsado_boton_alerta_reciba/" + window.location.search;

            fetch(url_api, {
                method: "GET"
            })
            .then(response => response.json())
            .then(data => {
                console.log("Respuesta JSON recibida:", data);

                const estado = document.getElementById("estado_fetch");

                if (data) {
                    if (estado) {
                        estado.className = "ok-box";
                        estado.innerHTML = "Alerta recibida correctamente. Cerrando ventana en 11 segundos.. <br> Desactivando aviso sala producción.";
                    }

                    setTimeout(() => {
                        window.close();

                        if (estado) {
                            estado.innerHTML = "Alerta recibida correctamente. Puede cerrar esta ventana. <br> Desactivando aviso sala producción.";
                        }
                    }, 7000);
                }
            })
            .catch(error => {
                console.error("Error registrando alerta:", error);

                const estado = document.getElementById("estado_fetch");

                if (estado) {
                    estado.className = "error-box";
                    estado.innerHTML = "No se pudo registrar la alerta recibida.";
                }
            });
        }

        pintarAlertas();
        registrarPulsadoBotonCorreo();
    </script>

</body>

</html>
